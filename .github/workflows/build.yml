name: Nexus Engine CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    name: Build Windows (Multi-API)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Vulkan SDK
      run: |
        choco install vulkan-sdk -y
        echo "VULKAN_SDK=C:\VulkanSDK\1.3.290.0" >> $env:GITHUB_ENV
      shell: powershell
      continue-on-error: true

    - name: Setup Dependencies
      run: |
        if (Test-Path "scripts\setup\setup_dependencies.bat") {
          cd scripts\setup
          .\setup_dependencies.bat
        } else {
          Write-Host "Setup script not found, skipping..."
        }
      shell: powershell
      continue-on-error: true

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pybind11
      shell: powershell
      continue-on-error: true

    - name: Configure CMake (Vulkan + DirectX 11)
      run: |
        cmake -B build `
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          -DENABLE_VULKAN=ON `
          -DENABLE_DIRECTX11=ON `
          -DENABLE_OPENGL=OFF `
          -DENABLE_PYTHON=OFF `
          -DENABLE_EXAMPLES=OFF

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel

    - name: Check Build Output
      run: |
        if (Test-Path "build\bin\${{env.BUILD_TYPE}}\NexusCore.lib") {
          Write-Host "✓ Build successful - NexusCore.lib created"
        } else {
          Write-Host "✗ Build may have failed - NexusCore.lib not found"
          Get-ChildItem build\bin -Recurse
        }
      shell: powershell

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nexus-engine-windows
        path: |
          build/bin/
          build/lib/
        if-no-files-found: warn

  build-linux:
    name: Build Linux (Vulkan + OpenGL)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libsdl2-dev \
          libvulkan-dev \
          vulkan-tools \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev

    - name: Setup Dependencies
      run: |
        if [ -f "scripts/setup/setup_dependencies.sh" ]; then
          chmod +x scripts/setup/setup_dependencies.sh
          cd scripts/setup
          ./setup_dependencies.sh
        else
          echo "Setup script not found, skipping..."
        fi
      continue-on-error: true

    - name: Install Python Dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install pybind11
      continue-on-error: true

    - name: Configure CMake (Vulkan + OpenGL)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DENABLE_VULKAN=ON \
          -DENABLE_DIRECTX11=OFF \
          -DENABLE_OPENGL=ON \
          -DENABLE_PYTHON=OFF \
          -DENABLE_EXAMPLES=OFF

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel $(nproc)

    - name: Check Build Output
      run: |
        if [ -f "build/bin/libNexusCore.a" ] || [ -f "build/lib/libNexusCore.a" ]; then
          echo "✓ Build successful - NexusCore library created"
          find build -name "*.a" -o -name "*.so"
        else
          echo "✗ Build may have failed"
          find build -type f
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nexus-engine-linux
        path: |
          build/bin/
          build/lib/
        if-no-files-found: warn

  build-macos:
    name: Build macOS (Vulkan/MoltenVK)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        brew update
        brew install cmake sdl2 molten-vk vulkan-headers vulkan-loader

    - name: Setup Dependencies
      run: |
        if [ -f "scripts/setup/setup_dependencies.sh" ]; then
          chmod +x scripts/setup/setup_dependencies.sh
          cd scripts/setup
          ./setup_dependencies.sh
        else
          echo "Setup script not found, skipping..."
        fi
      continue-on-error: true

    - name: Install Python Dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install pybind11
      continue-on-error: true

    - name: Configure CMake (Vulkan/MoltenVK)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DENABLE_VULKAN=ON \
          -DENABLE_DIRECTX11=OFF \
          -DENABLE_OPENGL=OFF \
          -DENABLE_PYTHON=OFF \
          -DENABLE_EXAMPLES=OFF

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel $(sysctl -n hw.ncpu)

    - name: Check Build Output
      run: |
        if [ -f "build/bin/libNexusCore.a" ] || [ -f "build/lib/libNexusCore.a" ]; then
          echo "✓ Build successful - NexusCore library created"
          find build -name "*.a" -o -name "*.dylib"
        else
          echo "✗ Build may have failed"
          find build -type f
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nexus-engine-macos
        path: |
          build/bin/
          build/lib/
        if-no-files-found: warn

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Check CMake Configuration
      run: |
        echo "Testing minimal CMake configuration..."
        cmake -B build-test \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_VULKAN=OFF \
          -DENABLE_DIRECTX11=OFF \
          -DENABLE_OPENGL=OFF \
          -DENABLE_PYTHON=OFF \
          -DENABLE_LUA=OFF \
          -DENABLE_BULLET_PHYSICS=OFF \
          -DENABLE_EXAMPLES=OFF
        echo "✓ CMake configuration successful"

    - name: Check Source Files
      run: |
        echo "Checking source file structure..."
        test -d "src" && echo "✓ src/ directory exists"
        test -d "include" && echo "✓ include/ directory exists"
        test -f "CMakeLists.txt" && echo "✓ Root CMakeLists.txt exists"
        test -f "src/CMakeLists.txt" && echo "✓ src/CMakeLists.txt exists"

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check Documentation Files
      run: |
        echo "Checking documentation..."
        test -f "README.md" && echo "✓ README.md found" || echo "✗ README.md missing"
        test -f "QUICKSTART.md" && echo "✓ QUICKSTART.md found"
        test -f "docs/OPENGL_SETUP.md" && echo "✓ OPENGL_SETUP.md found"
        test -f "docs/GAME_IMPORTER_GUIDE.md" && echo "✓ GAME_IMPORTER_GUIDE.md found"
        test -f "CODEBASE_AUDIT.md" && echo "✓ CODEBASE_AUDIT.md found"
        echo "Documentation check complete"

  build-summary:
    name: Build Summary
    needs: [build-windows, build-linux, build-macos, code-quality]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check Build Status
      run: |
        echo "Build Summary:"
        echo "=============="
        echo "Windows: ${{ needs.build-windows.result }}"
        echo "Linux: ${{ needs.build-linux.result }}"
        echo "macOS: ${{ needs.build-macos.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"

  create-release:
    name: Create Release Package
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Create Release Archive
      run: |
        cd artifacts
        zip -r ../nexus-engine-all-platforms.zip .
        cd ..
        ls -lh nexus-engine-all-platforms.zip

    - name: Upload Release Package
      uses: actions/upload-artifact@v4
      with:
        name: nexus-engine-release
        path: nexus-engine-all-platforms.zip
        retention-days: 30
